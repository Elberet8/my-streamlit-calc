name: Sync to Hugging Face
on:
  push:
    branches: [main]
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: git push -f https://Elberet8:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/Elberet8/my-vhs-calc main:main



